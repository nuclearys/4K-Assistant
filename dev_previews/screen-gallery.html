<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4K Screen Gallery</title>
  <style>
    :root {
      --preview-bg: #10131a;
      --preview-panel: #181c25;
      --preview-line: rgba(255, 255, 255, 0.1);
      --preview-text: #f8fafc;
      --preview-muted: #9ca3af;
      --preview-accent: #7c83ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      background: var(--preview-bg);
      color: var(--preview-text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    aside {
      min-height: 100vh;
      border-right: 1px solid var(--preview-line);
      background: var(--preview-panel);
      overflow-y: auto;
    }

    .preview-head {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 20px;
      border-bottom: 1px solid var(--preview-line);
      background: rgba(24, 28, 37, 0.94);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .preview-head p {
      margin: 8px 0 0;
      color: var(--preview-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .screen-list {
      display: grid;
      gap: 6px;
      padding: 12px;
    }

    .screen-group {
      margin: 14px 8px 6px;
      color: var(--preview-muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .screen-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--preview-text);
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .screen-button:hover,
    .screen-button.active {
      border-color: rgba(124, 131, 255, 0.45);
      background: rgba(124, 131, 255, 0.13);
    }

    .screen-button small {
      color: var(--preview-muted);
      font-size: 11px;
    }

    main {
      min-width: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 48px minmax(0, 1fr);
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 16px;
      border-bottom: 1px solid var(--preview-line);
      background: #0f131b;
    }

    .preview-toolbar strong {
      font-size: 14px;
    }

    .preview-toolbar code {
      color: var(--preview-muted);
      font-size: 12px;
    }

    .preview-toolbar a {
      color: var(--preview-accent);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #f7f9fb;
    }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      aside {
        min-height: auto;
        max-height: 42vh;
        border-right: 0;
        border-bottom: 1px solid var(--preview-line);
      }

      main {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <aside>
    <div class="preview-head">
      <h1>Screen Gallery</h1>
      <p>Dev-only preview surface for redesign QA. It reuses the real app shell and injects mock data.</p>
    </div>
    <nav id="screen-list" class="screen-list" aria-label="Screens"></nav>
  </aside>
  <main>
    <div class="preview-toolbar">
      <strong id="current-screen-label">Loading...</strong>
      <code id="current-screen-id"></code>
      <a id="open-frame-link" href="/" target="_blank" rel="noreferrer">Open canvas</a>
    </div>
    <iframe id="screen-frame" title="Screen preview canvas"></iframe>
  </main>
  <script src="/__screen-previews/screen-gallery.js"></script>
</body>
</html>
